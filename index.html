<!DOCTYPE html>
<!-- 
  ============================================================
  SELF ORDER WEB - OK KASIR
  Untuk pemilik toko: ISI 3 baris di bawah ini, lalu upload!
  ============================================================
-->
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Self Order | OK KASIR</title>
  <meta name="description" content="Pesan makanan & minuman langsung dari meja Anda" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #f59e0b;
      --primary-dark: #d97706;
      --primary-light: #fef3c7;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #232323;
      --card: #1e1e1e;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #555;
      --success: #10b981;
      --danger: #ef4444;
      --font: 'Plus Jakarta Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }

    /* ---------- HEADER ---------- */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .header-logo {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header-info h1 { font-size: 15px; font-weight: 700; }
    .header-info p { font-size: 12px; color: var(--primary); font-weight: 600; }
    .cart-btn {
      margin-left: auto; position: relative;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; transition: all .2s;
      font-family: var(--font); font-weight: 700; font-size: 14px; color: var(--text);
      -webkit-appearance: none; appearance: none;
    }
    .cart-btn:active { transform: scale(0.96); }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--danger); color: #fff;
      border-radius: 10px; min-width: 20px; height: 20px;
      font-size: 11px; font-weight: 800; display: flex;
      align-items: center; justify-content: center; padding: 0 4px;
      display: none;
    }

    /* ---------- HERO / TABLE BADGE ---------- */
    .table-banner {
      margin: 16px; padding: 16px 20px;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .table-icon { font-size: 28px; }
    .table-text strong { font-size: 17px; font-weight: 800; color: var(--primary); }
    .table-text span { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ---------- SEARCH ---------- */
    .search-wrap { padding: 0 16px 12px; }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 14px;
    }
    .search-box input {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font); font-size: 14px; color: var(--text);
    }
    .search-box input::placeholder { color: var(--text-dim); }

    /* ---------- CATEGORY TABS ---------- */
    .cat-scroll { padding: 0 16px 12px; overflow-x: auto; display: flex; gap: 8px; scrollbar-width: none; }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-chip {
      flex-shrink: 0; padding: 8px 16px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border);
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .cat-chip.active { background: var(--primary); border-color: var(--primary); color: #000; }

    /* ---------- PRODUCT GRID ---------- */
    .products { padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 120px; }
    .product-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden; cursor: pointer;
      transition: transform .15s, box-shadow .15s; position: relative;
    }
    .product-card:active { transform: scale(0.97); }
    .product-card .img {
      width: 100%; aspect-ratio: 1; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }
    .product-card .img img { width: 100%; height: 100%; object-fit: cover; }
    .product-card .info { padding: 10px; }
    .product-card .name { font-size: 13px; font-weight: 700; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-card .price { font-size: 14px; font-weight: 800; color: var(--primary); }
    .product-card .add-btn {
      position: absolute; bottom: 8px; right: 8px;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--primary); border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #000; font-weight: 900; cursor: pointer;
      transition: transform .15s;
    }
    .product-card .add-btn:active { transform: scale(0.9); }
    .qty-controls {
      position: absolute; bottom: 8px; right: 8px;
      display: flex; align-items: center; gap: 4px;
      background: var(--surface2); border-radius: 20px; padding: 3px 6px;
    }
    .qty-controls button {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: var(--primary); color: #000; font-size: 16px;
      font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: var(--font);
    }
    .qty-controls span { font-size: 13px; font-weight: 800; min-width: 20px; text-align: center; }
    .out-badge {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.8); color: var(--danger);
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px;
    }

    /* ---------- EMPTY STATE ---------- */
    .empty { padding: 60px 20px; text-align: center; grid-column: 1/-1; }
    .empty .emoji { font-size: 56px; margin-bottom: 12px; }
    .empty p { color: var(--text-muted); font-size: 14px; }

    /* ---------- LOADING ---------- */
    .loading { padding: 60px 20px; text-align: center; grid-column: 1/-1; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- CART DRAWER ---------- */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: none; }
    .overlay.show { display: block; }
    .cart-drawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
      background: var(--surface); border-radius: 24px 24px 0 0;
      border-top: 1px solid var(--border);
      max-height: 85vh; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform .3s cubic-bezier(0.32,0.72,0,1);
    }
    .cart-drawer.open { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 12px auto 4px;
    }
    .drawer-header { padding: 8px 20px 16px; border-bottom: 1px solid var(--border); }
    .drawer-header h2 { font-size: 18px; font-weight: 800; }
    .drawer-items { overflow-y: auto; flex: 1; padding: 12px 16px; }
    .cart-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item .ci-name { flex: 1; font-size: 14px; font-weight: 600; }
    .cart-item .ci-price { font-size: 13px; color: var(--primary); font-weight: 700; white-space: nowrap; }
    .cart-item .ci-qty { display: flex; align-items: center; gap: 6px; }
    .cart-item .ci-qty button {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: var(--surface2); color: var(--text); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: var(--font); font-weight: 700;
    }
    .cart-item .ci-qty span { font-size: 14px; font-weight: 800; min-width: 22px; text-align: center; }
    .note-area { padding: 12px 16px 8px; }
    .note-area label { font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 6px; }
    .note-area textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px; color: var(--text); font-family: var(--font);
      font-size: 13px; resize: none; outline: none; min-height: 56px;
    }
    .drawer-footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      background: var(--surface); padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .total-row span { font-size: 15px; color: var(--text-muted); font-weight: 600; }
    .total-row strong { font-size: 20px; font-weight: 800; color: var(--primary); }
    .order-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none; border-radius: 16px; font-family: var(--font);
      font-size: 16px; font-weight: 800; color: #000; cursor: pointer;
      transition: opacity .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .order-btn:active { opacity: 0.85; }
    .order-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; }

    /* ---------- SUCCESS SCREEN ---------- */
    #success-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 300;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    #success-screen.show { display: flex; }
    .success-icon { font-size: 80px; margin-bottom: 20px; animation: bounce .6s ease; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
    #success-screen h2 { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
    #success-screen p { color: var(--text-muted); font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
    .order-again-btn {
      padding: 14px 32px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 99px; font-family: var(--font); font-size: 14px; font-weight: 700;
      color: var(--text); cursor: pointer;
    }

    /* ---------- ERROR / CONFIG SCREEN ---------- */
    #config-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px; text-align: center;
    }
    #config-screen h2 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    #config-screen p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
    .config-form { width: 100%; max-width: 360px; margin: 24px auto 0; }
    .config-form input {
      width: 100%; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; font-family: var(--font); font-size: 14px; color: var(--text);
      outline: none; margin-bottom: 10px;
    }
    .config-form button {
      width: 100%; padding: 14px; background: var(--primary); border: none;
      border-radius: 14px; font-family: var(--font); font-size: 15px; font-weight: 700;
      color: #000; cursor: pointer;
    }

    /* ---------- BOTTOM CART FAB ---------- */
    .cart-fab {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      padding: 14px 28px; border-radius: 99px;
      display: none; align-items: center; gap: 10px;
      box-shadow: 0 8px 24px rgba(245,158,11,0.4);
      cursor: pointer; z-index: 100; transition: all .3s; min-width: 240px; justify-content: center;
      border: none; font-family: var(--font);
    }
    .cart-fab.show { display: flex; }
    .cart-fab:active { transform: translateX(-50%) scale(0.97); }
    .cart-fab span { font-size: 15px; font-weight: 800; color: #000; }
    .cart-fab .fab-total { color: #000; font-weight: 800; font-size: 15px; }
  </style>
</head>
<body>



<!-- MAIN APP -->
<div id="app" style="display:none">
  <header>
    <div class="header-logo">🍽️</div>
    <div class="header-info">
      <h1 id="store-name">OK KASIR</h1>
      <p id="table-label">Meja 1</p>
    </div>
    <button class="cart-btn" onclick="toggleCart()" id="cart-btn">
      🛒 <span id="cart-count-header">0</span>
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </header>

  <div class="table-banner">
    <div class="table-icon">🪑</div>
    <div class="table-text">
      <strong id="table-name-banner">Meja 1</strong>
      <span>Pilih menu, pesanan langsung ke kasir</span>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Cari menu..." oninput="filterMenu()" />
    </div>
  </div>

  <div class="cat-scroll" id="cat-tabs"></div>

  <div class="products" id="product-grid">
    <div class="loading">
      <div class="spinner"></div>
      <p style="color:var(--text-muted); font-size:14px">Memuat menu...</p>
    </div>
  </div>

  <!-- CART FAB -->
  <button class="cart-fab" id="cart-fab" onclick="toggleCart()">
    <span>🛒</span>
    <span id="fab-label">0 item</span>
    <span class="fab-total" id="fab-total">Rp 0</span>
  </button>
</div>

<!-- CART DRAWER -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <h2>🛒 Keranjang</h2>
  </div>
  <div class="drawer-items" id="cart-items-list"></div>
  <div class="note-area">
    <label>Catatan (opsional)</label>
    <textarea id="order-note" placeholder="Mis: tidak pedas, tanpa bawang..."></textarea>
  </div>
  <div class="drawer-footer">
    <div class="total-row">
      <span>Total</span>
      <strong id="cart-total">Rp 0</strong>
    </div>
    <button class="order-btn" id="submit-btn" onclick="submitOrder()">
      ✅ Pesan Sekarang
    </button>
  </div>
</div>

<!-- SUCCESS SCREEN -->
<div id="success-screen">
  <div class="success-icon">🎉</div>
  <h2>Pesanan Diterima!</h2>
  <p>Pesanan Anda sudah masuk ke kasir.<br/>Silakan tunggu, pesanan akan segera diproses.</p>
  <button class="order-again-btn" onclick="resetOrder()">Pesan Lagi</button>
</div>

<script>
  // ============================================================
  // ⚙️ KONFIGURASI - ISI OLEH PEMILIK TOKO
  // Ganti 3 nilai di bawah ini, lalu simpan file ini.
  // ============================================================
  let GAS_URL      = '<?= GAS_URL ?>';       // diisi otomatis oleh server
  let SHOP_ID      = '<?= SHOP_ID ?>';       // diisi otomatis dari QR
  let TABLE_NUMBER = '<?= TABLE_NUMBER ?>';  // diisi otomatis dari QR

  // ============================================================
  // STATE (jangan diubah)
  // ============================================================
  let allProducts = [];
  let cart = {};
  let activeCategory = 'semua';

  // ============================================================
  // INIT
  // ============================================================
  window.onload = () => {
    document.getElementById('app').style.display = 'block';
    document.getElementById('table-label').textContent = `Meja ${TABLE_NUMBER}`;
    document.getElementById('table-name-banner').textContent = `Meja ${TABLE_NUMBER}`;
    loadMenu();
  };

  // ============================================================
  // LOAD MENU FROM GAS
  // ============================================================
  async function loadMenu() {
    try {
      const res = await fetch(`${GAS_URL}?action=get_menu&shop_id=${SHOP_ID}&_t=${Date.now()}`);
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.message);

      allProducts = (json.data || []).filter(p => Number(p.price) > 0 && p.parent_id == 0);
      renderCategories();
      renderProducts();
    } catch (e) {
      document.getElementById('product-grid').innerHTML = `
        <div class="empty">
          <div class="emoji">📡</div>
          <p>Gagal memuat menu.<br/>Pastikan koneksi internet aktif.<br/><small style="color:var(--text-dim)">${e.message}</small></p>
        </div>`;
    }
  }

  function renderCategories() {
    const categories = ['semua', ...new Set(allProducts.map(p => p.category).filter(Boolean))];
    const el = document.getElementById('cat-tabs');
    el.innerHTML = categories.map(c => `
      <button class="cat-chip ${c === activeCategory ? 'active' : ''}" onclick="selectCat('${c}')">${c === 'semua' ? '🍽️ Semua' : c}</button>
    `).join('');
  }

  function selectCat(cat) {
    activeCategory = cat;
    renderCategories();
    renderProducts();
    document.getElementById('search-input').value = '';
  }

  function filterMenu() {
    renderProducts();
  }

  function renderProducts() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const filtered = allProducts.filter(p => {
      const matchCat = activeCategory === 'semua' || p.category === activeCategory;
      const matchSearch = !query || p.name.toLowerCase().includes(query);
      return matchCat && matchSearch;
    });

    const grid = document.getElementById('product-grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty"><div class="emoji">🔍</div><p>Menu tidak ditemukan</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const cartItem = cart[p.id];
      const qty = cartItem ? cartItem.qty : 0;
      const outOfStock = p.use_stock == 1 && Number(p.stock) <= 0;
      const emoji = getEmoji(p.category);

      return `
        <div class="product-card" onclick="handleProductTap(${p.id})" id="card-${p.id}">
          ${outOfStock ? '<div class="out-badge">Habis</div>' : ''}
          <div class="img">
            ${p.image
              ? `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='${emoji}'" />`
              : emoji}
          </div>
          <div class="info">
            <div class="name">${p.name}</div>
            <div class="price">${formatRp(p.price)}</div>
          </div>
          ${!outOfStock ? (qty > 0 
            ? `<div class="qty-controls" onclick="event.stopPropagation()">
                <button onclick="changeQty(${p.id}, -1)">−</button>
                <span>${qty}</span>
                <button onclick="changeQty(${p.id}, 1)">+</button>
               </div>`
            : `<button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">+</button>`)
            : ''}
        </div>`;
    }).join('');
  }

  function getEmoji(cat) {
    const map = { 'minuman': '🥤', 'makanan': '🍱', 'snack': '🍟', 'dessert': '🍰', 'kopi': '☕' };
    if (!cat) return '🍽️';
    const key = Object.keys(map).find(k => cat.toLowerCase().includes(k));
    return key ? map[key] : '🍽️';
  }

  // ============================================================
  // CART LOGIC
  // ============================================================
  function handleProductTap(id) {
    const p = allProducts.find(x => x.id == id);
    if (!p || (p.use_stock == 1 && Number(p.stock) <= 0)) return;
    if (!cart[id]) addToCart(id);
    else changeQty(id, 1);
  }

  function addToCart(id) {
    const p = allProducts.find(x => x.id == id);
    if (!p) return;
    cart[id] = { product: p, qty: 1 };
    updateUI();
  }

  function changeQty(id, delta) {
    if (!cart[id]) return;
    cart[id].qty += delta;
    if (cart[id].qty <= 0) delete cart[id];
    updateUI();
  }

  function updateUI() {
    renderProducts(); // refresh grid
    updateCartDrawer();
    updateFab();
  }

  function updateFab() {
    const items = Object.values(cart);
    const total = items.reduce((s, i) => s + i.qty * Number(i.product.price), 0);
    const count = items.reduce((s, i) => s + i.qty, 0);
    const fab = document.getElementById('cart-fab');
    if (count > 0) {
      fab.classList.add('show');
      document.getElementById('fab-label').textContent = `${count} item`;
      document.getElementById('fab-total').textContent = formatRp(total);
    } else {
      fab.classList.remove('show');
    }
    // Header count
    document.getElementById('cart-count-header').textContent = count;
  }

  function updateCartDrawer() {
    const items = Object.values(cart);
    const total = items.reduce((s, i) => s + i.qty * Number(i.product.price), 0);
    const list = document.getElementById('cart-items-list');
    
    if (items.length === 0) {
      list.innerHTML = `<div style="padding:40px 0; text-align:center; color:var(--text-muted)">Keranjang kosong 🛒</div>`;
    } else {
      list.innerHTML = items.map(({ product: p, qty }) => `
        <div class="cart-item">
          <div class="ci-name">${p.name}</div>
          <div class="ci-qty">
            <button onclick="changeQty(${p.id}, -1)">−</button>
            <span>${qty}</span>
            <button onclick="changeQty(${p.id}, 1)">+</button>
          </div>
          <div class="ci-price">${formatRp(Number(p.price) * qty)}</div>
        </div>
      `).join('');
    }
    
    document.getElementById('cart-total').textContent = formatRp(total);
    document.getElementById('submit-btn').disabled = items.length === 0;
  }

  function toggleCart() {
    const drawer = document.getElementById('cart-drawer');
    const overlay = document.getElementById('overlay');
    const isOpen = drawer.classList.contains('open');
    if (isOpen) {
      drawer.classList.remove('open');
      overlay.classList.remove('show');
    } else {
      updateCartDrawer();
      drawer.classList.add('open');
      overlay.classList.add('show');
    }
  }

  // ============================================================
  // SUBMIT ORDER
  // ============================================================
  async function submitOrder() {
    const items = Object.values(cart);
    if (items.length === 0) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Mengirim...';

    const note = document.getElementById('order-note').value.trim();
    const total = items.reduce((s, i) => s + i.qty * Number(i.product.price), 0);

    const payload = {
      action: 'push_self_order',
      shop_id: SHOP_ID,
      table_number: TABLE_NUMBER,
      items: items.map(({ product: p, qty }) => ({
        id: p.id,
        name: p.name,
        price: Number(p.price),
        qty
      })),
      total,
      note,
      timestamp: new Date().toISOString()
    };

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.message || 'Gagal mengirim pesanan');

      // SUCCESS
      document.getElementById('cart-drawer').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('success-screen').classList.add('show');
    } catch (e) {
      alert('Gagal mengirim pesanan: ' + e.message);
      btn.disabled = false;
      btn.innerHTML = '✅ Pesan Sekarang';
    }
  }

  function resetOrder() {
    cart = {};
    document.getElementById('order-note').value = '';
    document.getElementById('success-screen').classList.remove('show');
    updateUI();
    document.getElementById('submit-btn').innerHTML = '✅ Pesan Sekarang';
  }

  // ============================================================
  // HELPERS
  // ============================================================
  function formatRp(num) {
    return 'Rp ' + Math.round(num).toLocaleString('id-ID');
  }
</script>
